# BlueBoat Extension Manifest
#
# Defines UI metadata for the BlueRobotics BlueBoat USV extension.
# The server reads this at startup and includes it in the welcome payload.
#
# EDITING THIS FILE:
# - Changes take effect on server restart
# - No Go code changes required
# - Parameters define what form inputs the UI renders
# - TargetMode controls single vs broadcast targeting options

namespace: blueboat
version: "1.0"
displayName: "BlueBoat USV Controls"

specs:
  - label: "Max Speed"
    value: "3 m/s"
  - label: "Endurance"
    value: "~4 h"
  - label: "Draft"
    value: "0.1 m"
  - label: "Displacement"
    value: "~5 kg"

commands:
  - command: setThrottle
    label: "Set Throttle"
    description: "Set thruster throttle level"
    parameters:
      - name: throttle
        label: "Throttle"
        type: number
        min: -1
        max: 1
        default: 0

  - command: setHeading
    label: "Set Heading"
    description: "Set target heading"
    parameters:
      - name: heading
        label: "Heading (°)"
        type: number
        min: 0
        max: 360
        default: 0

  - command: deployAnchor
    label: "Deploy Anchor"
    description: "Deploy the anchor to hold position"
    confirmation: true

  - command: retractAnchor
    label: "Retract Anchor"
    description: "Retract the anchor to resume movement"
    confirmation: true

  - command: startSurvey
    label: "Start Survey"
    description: "Begin autonomous survey pattern"
    confirmation: true
    parameters:
      - name: laneSpacingM
        label: "Lane Spacing (m)"
        type: number
        min: 1
        max: 100
        default: 10
      - name: speedMs
        label: "Speed (m/s)"
        type: number
        min: 0.1
        max: 3
        default: 1

  - command: setNavMode
    label: "Set Nav Mode"
    description: "Change navigation behavior"
    parameters:
      - name: mode
        label: "Navigation Mode"
        type: select
        required: true
        options:
          - value: manual
            label: "Manual"
          - value: hold
            label: "Station Hold"
          - value: waypoint
            label: "Waypoint"
          - value: loiter
            label: "Loiter"

