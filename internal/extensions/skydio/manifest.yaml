# Skydio Extension Manifest
#
# Defines UI metadata for the Skydio autonomous drone extension.
# The server reads this at startup and includes it in the welcome payload.
#
# EDITING THIS FILE:
# - Changes take effect on server restart
# - No Go code changes required
# - Parameters define what form inputs the UI renders
# - TargetMode controls single vs broadcast targeting options

namespace: skydio
version: "1.0"
displayName: "Skydio Drone Controls"

specs:
  - label: "Max Speed"
    value: "16 m/s"
  - label: "Max Flight Time"
    value: "23 min"
  - label: "Max Altitude"
    value: "150 m AGL"
  - label: "Wind Resistance"
    value: "15 m/s"

commands:
  - command: setFlightMode
    label: "Set Flight Mode"
    description: "Change flight behavior"
    targetMode: both
    parameters:
      - name: mode
        label: "Flight Mode"
        type: select
        required: true
        options:
          - value: hover
            label: "Hover"
          - value: manual
            label: "Manual"
          - value: waypoint
            label: "Waypoint"
          - value: orbit
            label: "Orbit"

  - command: setGimbal
    label: "Gimbal Control"
    description: "Adjust camera gimbal pitch and yaw"
    parameters:
      - name: pitchDeg
        label: "Pitch"
        type: number
        min: -90
        max: 30
        default: 0
      - name: yawDeg
        label: "Yaw"
        type: number
        min: -180
        max: 180
        default: 0

  - command: startRecording
    label: "Start Recording"
    description: "Begin video recording"

  - command: stopRecording
    label: "Stop Recording"
    description: "End video recording"

  - command: takePhoto
    label: "Take Photo"
    description: "Capture a still image"
    targetMode: both  # Take photos from all drones simultaneously

  - command: orbit
    label: "Orbit Point"
    description: "Circle around a point of interest"
    confirmation: true
    parameters:
      - name: center
        label: "Center Point"
        type: coordinates
        required: true
        description: "Click on map to select orbit center"
      - name: radius
        label: "Radius (m)"
        type: number
        min: 5
        max: 100
        default: 20

  - command: track
    label: "Track Subject"
    description: "Begin autonomous subject tracking"
    confirmation: true

  - command: stopTracking
    label: "Stop Tracking"
    description: "End autonomous tracking"

  - command: setHome
    label: "Set Home"
    description: "Update the home/return location"
    parameters:
      - name: lat
        label: "Latitude"
        type: number
        required: true
      - name: lng
        label: "Longitude"
        type: number
        required: true

  - command: cableCam
    label: "Cable Cam"
    description: "Fly a repeatable path between two points"
    confirmation: true

  - command: setObstacleAvoidance
    label: "Obstacle Avoidance"
    description: "Enable or disable obstacle avoidance"
    parameters:
      - name: enabled
        label: "Enabled"
        type: select
        options:
          - value: "true"
            label: "On"
          - value: "false"
            label: "Off"
        default: "true"

